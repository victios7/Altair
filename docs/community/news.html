<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script>
const list = document.getElementById("news-list");

async function loadNews(){
  const { data, error } = await supabaseClient
    .from("news")
    .select("*")
    .order("created_at", { ascending: false });

  if (error) {
    list.innerHTML = `<div class="state-msg error">Error al cargar noticias: ${escapeHtml(error.message)}</div>`;
    return;
  }
  if (!data.length) {
    list.innerHTML = `<div class="empty-state">Todavía no hay noticias publicadas.</div>`;
    return;
  }
  list.innerHTML = data.map(item => `
    <div class="card">
      <div class="card-head">
        <h3>${escapeHtml(item.title)}</h3>
        <span class="card-meta"><span class="author">${escapeHtml(item.author)}</span> · ${timeAgo(item.created_at)}</span>
      </div>
      <p>${escapeHtml(item.content)}</p>
    </div>
  `).join("");
}

loadNews();
</script>
